<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A0A0F" />
    <title>Predicta Offline</title>
    <style>
      :root {
        --bg: #0a0a0f;
        --panel: rgba(18, 18, 26, 0.86);
        --border: rgba(255, 255, 255, 0.1);
        --text: #ffffff;
        --muted: #a0a0b2;
        --gradient: linear-gradient(90deg, #7b61ff, #4dafff, #ff4da6);
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at top right, rgba(123, 97, 255, 0.22), transparent 34%),
          radial-gradient(circle at bottom left, rgba(77, 175, 255, 0.16), transparent 28%),
          var(--bg);
        color: var(--text);
        display: flex;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)), var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
        max-width: 560px;
        padding: 32px;
        width: 100%;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        margin: 0 0 12px;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(32px, 5vw, 44px);
        line-height: 1.04;
        margin: 0 0 14px;
      }

      p {
        color: var(--muted);
        line-height: 1.7;
        margin: 0 0 18px;
      }

      a {
        align-items: center;
        background: var(--gradient);
        border-radius: 8px;
        color: white;
        display: inline-flex;
        font-weight: 800;
        justify-content: center;
        min-height: 48px;
        padding: 14px 20px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Offline</p>
      <h1>Predicta is waiting for your connection.</h1>
      <p>
        The app shell is available, but live guidance, chart sync, and connected actions need the internet.
        Reconnect and reopen the page when you are ready.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
