# Firebase App Hosting configuration for Predicta web.
# The Next.js API routes stay server-side and proxy to the Cloud Run astrology API.
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: PRIDICTA_WEB_ASTRO_API_URL
    value: https://predicta-backend-pxf7yw4soq-el.a.run.app
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDK4CQXC9gPqOqX9lJEcKYbt_rt5kXvqL4
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: predicta-a4758.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: predicta-a4758
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: predicta-a4758.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "759876006782"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:759876006782:web:8c350429f635548ec6792f
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-R5N9VD3E0L
    availability:
      - BUILD
      - RUNTIME
